<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>咪咪工具箱目录</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d9dee7;
      --primary: #0f6cbd;
      --primary-dark: #0b5798;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 36px 20px 48px;
    }

    header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .tool {
      display: block;
      min-height: 154px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .tool:hover {
      border-color: var(--primary);
      box-shadow: 0 10px 24px rgba(15, 108, 189, 0.12);
      transform: translateY(-1px);
    }

    .tool h2 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .tool p {
      margin-bottom: 18px;
    }

    .open {
      color: var(--primary);
      font-weight: 700;
    }

    .tool:hover .open {
      color: var(--primary-dark);
    }

    footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 640px) {
      main {
        padding: 24px 14px 36px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>咪咪工具箱目录</h1>
    </header>

    <section class="grid" aria-label="工具列表">
      <a class="tool" href="./excel-image-exporter.html">
        <h2>天马表格图片打包工具</h2>
        <p>读取 .xlsx 中插入的图片，按指定列内容命名，并按行范围导出为 zip。</p>
        <span class="open">打开工具</span>
      </a>
    </section>
  </main>
</body>
</html>
