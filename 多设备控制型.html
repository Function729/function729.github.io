<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧照明</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei", Arial, sans-serif;
}

html, body{
    width:100%;
    height:100%;
}

body{
    background:transparent;
    display:flex;
    justify-content:center;
    align-items:center;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

.panel{
    width:1300px;
    height:700px;
    background:linear-gradient(180deg,rgba(13,58,102,0.86),rgba(8,36,67,0.86));
    border:none;
    border-radius:10px;
    color:white;
    position:relative;
    overflow:hidden;
    flex:0 0 auto;
}

@media (max-aspect-ratio: 13/7){
    .panel{
        width:100vw;
        height:calc(100vw * 7 / 13);
    }
}

@media (min-aspect-ratio: 13/7){
    .panel{
        width:calc(100vh * 13 / 7);
        height:100vh;
    }
}

@media (max-width: 900px), (max-height: 520px){
    .header{
        height:52px;
        padding:0 12px;
    }

    .title{
        font-size:20px;
    }

    .master{
        font-size:16px;
        gap:8px;
    }

    .switch{
        width:68px;
        height:32px;
        padding-left:12px;
        font-size:14px;
    }

    .switch::after{
        width:26px;
        height:26px;
    }

    .content{
        height:calc(100% - 52px);
        padding:12px;
    }

    .grid{
        grid-template-columns:1fr;
        gap:10px;
    }

    .card{
        min-height:58px;
        padding:10px;
        gap:10px;
    }

    .left{
        min-width:180px;
        gap:10px;
    }

    .name{
        font-size:18px;
        max-width:120px;
    }

    .status{
        font-size:15px;
    }
}

.panel::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
}

.header{
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    border-bottom:none;
    position:relative;
    z-index:1;
}

.title{
    font-size:28px;
    font-weight:bold;
    color:white;
}

.master{
    display:flex;
    align-items:center;
    gap:15px;
    font-size:22px;
}

.switch{
    width:90px;
    height:42px;
    border-radius:30px;
    background:#19c6ff;
    position:relative;
    display:flex;
    align-items:center;
    padding-left:18px;
    font-weight:bold;
}

.switch.off{
    background:#6b7f92;
}

.switch::after{
    content:"";
    position:absolute;
    width:34px;
    height:34px;
    border-radius:50%;
    background:white;
    right:4px;
}

.switch.off::after{
    left:4px;
    right:auto;
}

.content{
    padding:20px;
    height:calc(100% - 60px);
    overflow-y:auto;
    position:relative;
    z-index:1;
}

.content::-webkit-scrollbar{
    width:10px;
}

.content::-webkit-scrollbar-track{
    background:rgba(255,255,255,0.05);
}

.content::-webkit-scrollbar-thumb{
    background:#1ebeff;
    border-radius:10px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px 20px;
}

.card{
    border:none;
    background:rgba(255,255,255,0.03);
    border-radius:8px;
    padding:18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    min-height:76px;
    gap:18px;
}

.left{
    display:flex;
    align-items:center;
    gap:16px;
    min-width:230px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#8ddfff;
    flex:0 0 auto;
}

.name{
    font-size:26px;
    min-width:100px;
    max-width:190px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.status{
    font-size:21px;
    white-space:nowrap;
}

.normal{
    color:white;
}

.error{
    color:#ff4b4b;
    font-weight:bold;
}

.page-watermark{
    position:fixed;
    right:18px;
    bottom:14px;
    z-index:9999;
    pointer-events:none;
    color:rgba(255,255,255,0.32);
    font:14px/1.2 "Microsoft YaHei", Arial, sans-serif;
    letter-spacing:0;
    text-shadow:0 1px 4px rgba(0,0,0,0.35);
}
</style>
</head>

<body>
<div class="page-watermark">张永昊 · v2026.05.08.1</div>
<div class="panel">
    <div class="header">
        <div class="title" id="pageTitle">5#智慧照明</div>

        <div class="master">
            <div>总控：</div>
            <div class="switch" id="masterSwitch">ON</div>
        </div>
    </div>

    <div class="content">
        <div class="grid" id="lightContainer"></div>
    </div>
</div>

<script>
const fallbackData = {
    title: "5#智慧照明",
    masterOn: true,
    lights: [
        {name:"回路1", on:true, state:"开", fault:"正常"},
        {name:"回路2", on:true, state:"开", fault:"正常"}
    ]
};

function escapeHtml(value){
    return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "\"":"&quot;",
        "'":"&#39;"
    }[char]));
}

function tokenizeLooseJson(text){
    const tokens = [];
    let i = 0;

    while(i < text.length){
        const char = text[i];

        if(/\s|,/.test(char)){
            i++;
            continue;
        }

        if("{}[]".includes(char)){
            tokens.push(char);
            i++;
            continue;
        }

        if(char === "\"" || char === "'"){
            const quote = char;
            let value = "";
            i++;
            while(i < text.length && text[i] !== quote){
                if(text[i] === "\\" && i + 1 < text.length){
                    value += text[i + 1];
                    i += 2;
                }else{
                    value += text[i++];
                }
            }
            i++;
            tokens.push(value);
            continue;
        }

        let value = "";
        while(i < text.length && !/\s|,|[{}\[\]]/.test(text[i])){
            value += text[i++];
        }
        tokens.push(value);
    }

    return tokens;
}

function parseLooseJson(text){
    try{
        return JSON.parse(text);
    }catch(error){
        const tokens = tokenizeLooseJson(text);
        let index = 0;

        function peek(){
            return tokens[index];
        }

        function next(){
            return tokens[index++];
        }

        function normalizeValue(value){
            if(value === "null") return null;
            if(value === "true") return true;
            if(value === "false") return false;
            if(value === "") return "";
            if(/^-?\d+(\.\d+)?$/.test(value)) return Number(value);
            return value;
        }

        function parseValue(){
            if(peek() === "{") return parseObject();
            if(peek() === "[") return parseArray();
            if(peek() === "}" || peek() === "]" || peek() === undefined) return "";
            return normalizeValue(next());
        }

        function parseObject(){
            const result = {};
            next();
            while(peek() !== "}" && peek() !== undefined){
                const key = next();
                result[key] = parseValue();
            }
            if(peek() === "}") next();
            return result;
        }

        function parseArray(){
            const result = [];
            next();
            while(peek() !== "]" && peek() !== undefined){
                result.push(parseValue());
            }
            if(peek() === "]") next();
            return result;
        }

        return parseValue();
    }
}

function parseLooseDeviceMessage(text){
    const listStart = text.search(/\bdataList\s*\[/);
    if(listStart < 0) return null;

    const arrayStart = text.indexOf("[", listStart);
    const rows = [];
    let objectDepth = 0;
    let start = -1;

    for(let i = arrayStart + 1; i < text.length; i++){
        const char = text[i];
        if(char === "{"){
            if(objectDepth === 0) start = i;
            objectDepth++;
        }else if(char === "}"){
            objectDepth--;
            if(objectDepth === 0 && start >= 0){
                rows.push(parseLooseDeviceRow(text.slice(start, i + 1)));
                start = -1;
            }
        }else if(char === "]" && objectDepth === 0){
            break;
        }
    }

    return rows.length ? {data:{dataList:rows}} : null;
}

function parseLooseDeviceRow(block){
    const row = {};
    const enumMatch = block.match(/\benumDef\s*\[([\s\S]*?)\n\s*\]/);

    if(enumMatch){
        row.enumDef = [];
        const enumBlocks = enumMatch[1].match(/\{[\s\S]*?\}/g) || [];
        enumBlocks.forEach(enumBlock => {
            const item = {};
            enumBlock.split(/\r?\n/).forEach(line => {
                const match = line.trim().match(/^([A-Za-z_][\w]*)\s*(.*?)\s*,?$/);
                if(match) item[match[1]] = normalizeLooseScalar(match[2]);
            });
            row.enumDef.push(item);
        });
        block = block.replace(enumMatch[0], "enumDef null");
    }

    block.split(/\r?\n/).forEach(line => {
        const match = line.trim().match(/^([A-Za-z_][\w]*)\s*(.*?)\s*,?$/);
        if(!match) return;

        const key = match[1];
        if(key === "attribute" || key === "name") return;
        row[key] = normalizeLooseScalar(match[2]);
    });

    return row;
}

function normalizeLooseScalar(value){
    const trimmed = String(value ?? "").trim();
    if(trimmed === "" || trimmed === ",") return "";
    if(trimmed === "null") return null;
    if(trimmed === "true") return true;
    if(trimmed === "false") return false;
    if(/^-?\d+(\.\d+)?$/.test(trimmed)) return Number(trimmed);
    return trimmed.replace(/,$/, "");
}

function toDisplayData(raw){
    const source = typeof raw === "string" ? (parseLooseDeviceMessage(raw) || parseLooseJson(raw)) : raw;
    const rows = source?.data?.dataList || source?.dataList || source?.lights || [];
    const firstRow = rows[0] || {};
    const title = source?.title || source?.data?.title || firstRow.deviceModelName || fallbackData.title;

    const validRows = rows.filter(row => row && (
        row.variableCode ||
        row.variableName ||
        row.abbreviation ||
        row.deviceModelNumber
    ));

    return {
        title,
        masterOn: source?.masterOn ?? true,
        lights: validRows.map((row, index) => {
            const enumItems = Array.isArray(row.enumDef) ? row.enumDef : [];
            const offName = enumItems.find(item => String(item.attribute) === "0")?.name || "关";
            const onName = enumItems.find(item => String(item.attribute) === "1")?.name || "开";
            const isSwitch = row.dataType === "enum" || row.variableCode === "OnOffSetup";
            const on = isSwitch ? Number(row.control ?? 0) !== 0 : true;
            const state = isSwitch ? (on ? onName : offName) : (row.max !== "" && row.max != null ? `范围 ${row.min ?? ""}-${row.max}` : row.dataType || "-");

            return {
                name: row.variableName || row.abbreviation || row.variableCode || `回路${index + 1}`,
                on,
                state,
                fault: row.fault || row.faultText || "正常"
            };
        })
    };
}

function renderLights(input){
    const data = toDisplayData(input);
    const pageTitle = document.getElementById("pageTitle");
    const masterSwitch = document.getElementById("masterSwitch");
    const container = document.getElementById("lightContainer");

    document.title = data.title;
    pageTitle.innerText = data.title;

    masterSwitch.classList.toggle("off", !data.masterOn);
    masterSwitch.innerText = data.masterOn ? "ON" : "OFF";

    container.innerHTML = "";
    data.lights.forEach(light => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="left">
                <div class="dot"></div>
                <div class="name" title="${escapeHtml(light.name)}">${escapeHtml(light.name)}</div>
                <div class="switch ${light.on ? "" : "off"}">${light.on ? "ON" : "OFF"}</div>
            </div>
            <div class="status">状态：<span class="normal">${escapeHtml(light.state)}</span></div>
            <div class="status">故障：<span class="${light.fault === "故障" ? "error" : "normal"}">${escapeHtml(light.fault)}</span></div>
        `;
        container.appendChild(card);
    });
}

window.renderLights = renderLights;
window.receiveDeviceData = renderLights;

window.addEventListener("message", event => {
    renderLights(event.data);
});

renderLights(fallbackData);
</script>
</body>
</html>
